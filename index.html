<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送迎配車表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd5;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #9c9a94;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --accent-text: #1a3d27;
    --maru-bg: #e6f4ec;
    --maru-text: #1a6b35;
    --maru-border: #7dc49a;
    --batu-bg: #fcecea;
    --batu-text: #8b2020;
    --batu-border: #e8958f;
    --my-bg: #f0f4ff;
    --my-border: #b8c8f0;
    --weekend: #faf9f6;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ===== LOGIN ===== */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .login-overlay.hidden { opacity: 0; pointer-events: none; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 340px;
    box-shadow: var(--shadow-md);
  }
  .login-logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 2rem;
  }
  .login-logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px;
  }
  .login-logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
  .login-logo-sub { font-size: 11px; color: var(--text3); }

  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text2); margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px; font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%; padding: 11px;
    background: var(--accent);
    color: white;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error {
    font-size: 12px; color: var(--batu-text);
    margin-top: 8px; min-height: 18px; text-align: center;
  }
  .login-hint {
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3); line-height: 1.8;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 15px;
  }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-badge {
    font-size: 12px; color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
  }
  .logout-btn {
    font-size: 12px; color: var(--text2);
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    cursor: pointer; font-family: inherit;
    transition: background 0.1s;
  }
  .logout-btn:hover { background: var(--surface2); }

  /* ===== MAIN ===== */
  .main { padding: 1.5rem; }

  /* ===== TABS ===== */
  .tabs-wrap {
    display: flex; gap: 6px; margin-bottom: 1.5rem;
    overflow-x: auto; padding-bottom: 2px;
  }
  .tab {
    font-size: 13px; font-family: inherit;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: white; border-color: transparent;
    font-weight: 500;
  }
  .tab:hover:not(.active) { background: var(--surface2); }

  /* ===== INFO BAR ===== */
  .info-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
  }
  .info-text { font-size: 13px; color: var(--text2); }
  .legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text3); }
  .legend-dot { width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .legend-dot.maru { background: var(--maru-bg); color: var(--maru-text); }
  .legend-dot.batu { background: var(--batu-bg); color: var(--batu-text); }

  /* ===== TABLE ===== */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--surface2);
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    padding: 6px 4px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: center;
    white-space: nowrap;
  }
  thead th.name-th {
    text-align: left; padding-left: 14px;
    min-width: 88px; position: sticky; left: 0;
    background: var(--surface2); z-index: 2;
  }
  thead th.date-th { min-width: 52px; }
  thead th.sat { color: #3060a0; }
  thead th.sun { color: #a03030; }
  thead tr:last-child th { border-bottom: 2px solid var(--border); }

  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.my-row { background: var(--my-bg); }
  tbody tr.my-row:hover { background: #e8edfc; }

  tbody td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 3px 3px;
    text-align: center;
    vertical-align: middle;
  }
  tbody td.name-td {
    text-align: left; padding-left: 14px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap;
    position: sticky; left: 0;
    background: inherit; z-index: 1;
    border-right: 2px solid var(--border);
  }
  tbody tr.my-row td.name-td { background: var(--my-bg); }
  tbody tr:hover td.name-td { background: var(--surface2); }
  tbody tr.my-row:hover td.name-td { background: #e8edfc; }
  tbody td.weekend { background: var(--weekend); }

  /* ===== MARK BUTTON ===== */
  .mark-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 24px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: none; cursor: default;
    font-size: 13px; font-weight: 700;
    font-family: inherit;
    transition: all 0.1s;
  }
  .mark-btn.editable { cursor: pointer; }
  .mark-btn.editable:hover { transform: scale(1.1); }
  .mark-btn.maru { background: var(--maru-bg); color: var(--maru-text); border-color: var(--maru-border); }
  .mark-btn.batu { background: var(--batu-bg); color: var(--batu-text); border-color: var(--batu-border); }
  .mark-btn.empty { color: var(--text3); }

  /* ===== SETUP MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 2rem;
    width: 100%; max-width: 480px;
    box-shadow: var(--shadow-md);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 0.5rem; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.7; }
  .modal label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 5px; margin-top: 12px; }
  .modal input {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--border); border-radius: 7px;
    font-size: 13px; font-family: inherit; outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.5rem; }
  .modal-btn {
    flex: 1; padding: 10px;
    border-radius: 7px; font-size: 13px; font-weight: 500;
    font-family: inherit; cursor: pointer; border: 1px solid var(--border);
    transition: opacity 0.15s;
  }
  .modal-btn.primary { background: var(--accent); color: white; border-color: transparent; }
  .modal-btn.primary:hover { opacity: 0.88; }
  .modal-btn.secondary { background: var(--surface); color: var(--text2); }
  .modal-btn.secondary:hover { background: var(--surface2); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #1a1917; color: white;
    padding: 9px 18px; border-radius: 20px;
    font-size: 13px; z-index: 300;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ===== LOADING ===== */
  .loading-row td {
    padding: 2rem; text-align: center;
    color: var(--text3); font-size: 13px;
  }

  /* ===== CONFIG NOTE ===== */
  .config-note {
    background: #fff8e6;
    border: 1px solid #f0d080;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px; color: #7a5500;
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .config-note a { color: var(--accent); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<!-- ===== SUPABASE CONFIG ===== -->
<!-- ここを自分のSupabase URLとAnonキーに書き換えてください -->
<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const IS_CONFIGURED = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
</script>

<!-- ===== LOGIN ===== -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🚐</div>
      <div>
        <div class="login-logo-text">送迎配車表</div>
        <div class="login-logo-sub">Shuttle Schedule</div>
      </div>
    </div>
    <div class="form-group">
      <label>ユーザーID</label>
      <input type="text" id="login-id" placeholder="例：ando" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pw" placeholder="••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint" id="login-hint"></div>
  </div>
</div>

<!-- ===== HEADER ===== -->
<header class="header" id="header" style="display:none;">
  <div class="header-left">
    <div class="header-icon">🚐</div>
    <div class="header-title">送迎配車表</div>
  </div>
  <div class="header-right">
    <div class="user-badge" id="user-badge"></div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="main" id="main" style="display:none;">
  <div class="config-note" id="config-note" style="display:none;">
    ⚠️ Supabaseの設定がまだです。<a onclick="openSetupModal()">設定する</a> か、index.html の SUPABASE_URL と SUPABASE_ANON_KEY を書き換えてください。
  </div>

  <div class="tabs-wrap" id="tabs-wrap"></div>

  <div class="info-bar">
    <div class="info-text" id="info-text"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot maru">○</div>乗車あり</div>
      <div class="legend-item"><div class="legend-dot batu">×</div>乗車なし</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table id="main-table"></table>
    </div>
  </div>
</main>

<!-- ===== SETUP MODAL ===== -->
<div class="modal-overlay hidden" id="setup-modal">
  <div class="modal">
    <h3>Supabase 接続設定</h3>
    <p>Supabaseのプロジェクト設定画面から「Project URL」と「anon public」キーを取得して入力してください。</p>
    <label>Project URL</label>
    <input type="text" id="setup-url" placeholder="https://xxxx.supabase.co" />
    <label>Anon Key</label>
    <input type="text" id="setup-key" placeholder="eyJhbGciOiJIUzI1NiIs..." />
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeSetupModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="saveSetup()">保存して接続</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== SUPABASE SDK ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== ユーザー設定（ここを編集してください） =====
const USERS = [
  { id: 'ando',     name: '安藤健二',  pw: '1234' },
  { id: 'suzuki',   name: '鈴木太郎',  pw: '1234' },
  { id: 'tanaka',   name: '田中次郎',  pw: '1234' },
  { id: 'nakamura', name: '中村花子',  pw: '1234' },
  { id: 'yamamoto', name: '山本一郎',  pw: '1234' },
];

// ===== 状態 =====
let currentUser = null;
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let supabase = null;
let localData = {};

// ===== 初期化 =====
function initSupabase() {
  const url = localStorage.getItem('sb_url') || SUPABASE_URL;
  const key = localStorage.getItem('sb_key') || SUPABASE_ANON_KEY;
  if (url !== 'YOUR_SUPABASE_URL' && key !== 'YOUR_SUPABASE_ANON_KEY') {
    try {
      supabase = window.supabase.createClient(url, key);
      return true;
    } catch(e) { return false; }
  }
  return false;
}

window.onload = () => {
  initSupabase();
  const hint = document.getElementById('login-hint');
  hint.innerHTML = 'デモ用アカウント（パスワード：1234）<br>' +
    USERS.map(u => u.id).join(' / ');
};

// ===== ログイン =====
async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const user = USERS.find(u => u.id === id && u.pw === pw);
  if (!user) {
    document.getElementById('login-error').textContent = 'IDまたはパスワードが正しくありません';
    return;
  }
  currentUser = user;
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('header').style.display = 'flex';
  document.getElementById('main').style.display = 'block';
  document.getElementById('user-badge').textContent = currentUser.name;
  if (!IS_CONFIGURED && !localStorage.getItem('sb_url')) {
    document.getElementById('config-note').style.display = 'flex';
  }
  buildTabs();
  await renderTable();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('header').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').textContent = '';
}

// ===== タブ =====
function buildTabs() {
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = '';
  const now = new Date();
  for (let i = -1; i <= 3; i++) {
    let m = now.getMonth() + i;
    let y = now.getFullYear();
    while (m < 0) { m += 12; y--; }
    while (m > 11) { m -= 12; y++; }
    const tab = document.createElement('button');
    tab.className = 'tab' + (m === currentMonth && y === currentYear ? ' active' : '');
    tab.textContent = `${y}年${m+1}月`;
    tab.onclick = () => { currentMonth = m; currentYear = y; buildTabs(); renderTable(); };
    wrap.appendChild(tab);
  }
}

// ===== データ取得 =====
async function fetchData(year, month) {
  if (!supabase) return {};
  try {
    const { data, error } = await supabase
      .from('haisha')
      .select('user_id, day, slot, value')
      .eq('year', year)
      .eq('month', month);
    if (error) throw error;
    const map = {};
    for (const row of data) {
      map[`${row.user_id}_${row.day}_${row.slot}`] = row.value;
    }
    return map;
  } catch(e) {
    return localData;
  }
}

// ===== データ保存 =====
async function saveData(userId, year, month, day, slot, value) {
  const key = `${userId}_${day}_${slot}`;
  if (value === null) {
    delete localData[key];
  } else {
    localData[key] = value;
  }
  if (!supabase) {
    showToast('※ Supabase未設定のためローカル保存のみ');
    return;
  }
  try {
    if (value === null) {
      await supabase.from('haisha').delete()
        .eq('user_id', userId).eq('year', year).eq('month', month)
        .eq('day', day).eq('slot', slot);
    } else {
      await supabase.from('haisha').upsert({
        user_id: userId, year, month, day, slot, value
      }, { onConflict: 'user_id,year,month,day,slot' });
    }
    showToast('保存しました');
  } catch(e) {
    showToast('保存エラー: ' + e.message);
  }
}

// ===== テーブル描画 =====
async function renderTable() {
  const year = currentYear;
  const month = currentMonth;
  const days = new Date(year, month + 1, 0).getDate();
  const DOW = ['日','月','火','水','木','金','土'];

  document.getElementById('info-text').textContent =
    `${year}年${month+1}月 ／ 自分の行（青背景）のみ編集できます`;

  const table = document.getElementById('main-table');
  table.innerHTML = '<tbody><tr class="loading-row"><td colspan="99">読み込み中...</td></tr></tbody>';

  const rowData = await fetchData(year, month);
  localData = rowData;

  let html = '<thead>';
  // 日付行
  html += '<tr><th class="name-th">氏名</th>';
  for (let d = 1; d <= days; d++) {
    const dow = new Date(year, month, d).getDay();
    const cls = dow === 6 ? 'date-th sat' : dow === 0 ? 'date-th sun' : 'date-th';
    html += `<th colspan="2" class="${cls}">${d}<br><span style="font-size:10px;">${DOW[dow]}</span></th>`;
  }
  html += '</tr>';
  // 朝夕行
  html += '<tr><th class="name-th"></th>';
  for (let d = 1; d <= days; d++) {
    html += '<th>朝</th><th>夕</th>';
  }
  html += '</tr></thead><tbody>';

  for (const user of USERS) {
    const isMe = user.id === currentUser.id;
    html += `<tr class="${isMe ? 'my-row' : ''}">`;
    html += `<td class="name-td">${isMe ? '▶ ' : ''}${user.name}</td>`;
    for (let d = 1; d <= days; d++) {
      const dow = new Date(year, month, d).getDay();
      const isWe = dow === 0 || dow === 6;
      const weCls = isWe ? ' weekend' : '';
      for (const slot of ['am', 'pm']) {
        const val = rowData[`${user.id}_${d}_${slot}`];
        let markCls = 'empty', label = '－';
        if (val === 1) { markCls = 'maru'; label = '○'; }
        else if (val === 0) { markCls = 'batu'; label = '×'; }
        const editable = isMe ? ' editable' : '';
        const onclick = isMe ? ` onclick="toggleMark(${d},'${slot}',this,${year},${month})"` : '';
        html += `<td class="${weCls}"><button class="mark-btn ${markCls}${editable}"${onclick}>${label}</button></td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

// ===== マーク切替 =====
async function toggleMark(day, slot, cell, year, month) {
  const btn = cell;
  const cur = btn.classList.contains('maru') ? 1 : btn.classList.contains('batu') ? 0 : null;
  let next = cur === null ? 1 : cur === 1 ? 0 : null;

  btn.classList.remove('maru', 'batu', 'empty');
  if (next === 1) { btn.classList.add('maru'); btn.textContent = '○'; }
  else if (next === 0) { btn.classList.add('batu'); btn.textContent = '×'; }
  else { btn.classList.add('empty'); btn.textContent = '－'; }

  await saveData(currentUser.id, year, month, day, slot, next);
}

// ===== Supabase設定モーダル =====
function openSetupModal() {
  document.getElementById('setup-url').value = localStorage.getItem('sb_url') || '';
  document.getElementById('setup-key').value = localStorage.getItem('sb_key') || '';
  document.getElementById('setup-modal').classList.remove('hidden');
}
function closeSetupModal() {
  document.getElementById('setup-modal').classList.add('hidden');
}
function saveSetup() {
  const url = document.getElementById('setup-url').value.trim();
  const key = document.getElementById('setup-key').value.trim();
  if (!url || !key) { showToast('URLとキーを入力してください'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  supabase = window.supabase.createClient(url, key);
  document.getElementById('config-note').style.display = 'none';
  closeSetupModal();
  showToast('Supabaseに接続しました');
  renderTable();
}

// ===== トースト =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Enterキーでログイン
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-overlay').classList.contains('hidden')) {
    doLogin();
  }
});
</script>
